<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flost8</title>
    <link href="styles.css" rel="stylesheet">
    <script>
        // Custom config for glass effect colors if needed or kept in CSS
        // Since we moved to compiled CSS, we might need to ensure these custom colors are in the input or just use what we have.
        // Wait, the CDN config had 'glass' colors.
        // I need to ensure the compiled CSS includes these. 
        // The command I ran only scans existing Utility classes. 
        // If 'glass-light' or 'bg-glass-light' are used, they won't be generated if not in standard Tailwind config.
        // The previous index.html had a script tag defining config.
    </script>
    <style>
        /* Custom styles for glass effect and scrollbar */
        .glass-light {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .glass-dark {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .drag-region {
            -webkit-app-region: drag;
        }
        
        .no-drag {
            -webkit-app-region: no-drag;
        }
        
        /* Custom scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(156, 163, 175, 0.3);
            border-radius: 3px;
        }
        
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(156, 163, 175, 0.5);
        }
        
        /* Animation classes */
        .slide-in {
            animation: slideIn 0.2s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .fade-out {
            animation: fadeOut 0.2s ease-in;
        }
        
        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: scale(1);
            }
            to {
                opacity: 0;
                transform: scale(0.95);
            }
        }
        
        /* Task completion animation */
        .task-complete {
            animation: taskComplete 0.3s ease-in-out;
        }
        
        @keyframes taskComplete {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="m-0 p-0 overflow-hidden select-none font-sans text-gray-800 dark:text-gray-100 bg-transparent">
    <!-- Main Container with Premium Glass Effect -->
    <div id="app" class="w-full h-screen flex flex-col rounded-2xl overflow-hidden transition-all duration-300 relative group">
        
        <!-- Gradient Border/Glow Container -->
        <div class="absolute inset-0 bg-gradient-to-br from-violet-500/20 to-fuchsia-500/20 pointer-events-none opacity-50"></div>
        
        <!-- Background Layer -->
        <div class="absolute inset-0 glass-bg backdrop-blur-xl z-0 transition-colors duration-300 bg-white/80 dark:bg-gray-900/80"></div>

        <!-- Content Layer -->
        <div class="relative z-10 flex flex-col h-full">
            
            <!-- Title Bar -->
            <div id="titleBar" class="drag-region flex items-center justify-between p-4 pb-2">
                <div class="flex items-center space-x-3 group/brand">
                    <div class="relative">
                        <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-violet-500 to-fuchsia-600 flex items-center justify-center shadow-lg shadow-violet-500/30 group-hover/brand:scale-110 transition-transform duration-300">
                           <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                        </div>
                    </div>
                    <div id="brandTextContainer" class="min-w-[80px] cursor-pointer no-drag group/text" title="Toggle Compact Mode">
                        <h1 id="brandTitle" class="text-base font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-violet-600 to-fuchsia-600 dark:from-violet-400 dark:to-fuchsia-400 transition-all duration-300">flost8</h1>
                    </div>
                </div>

                <!-- Window Controls -->
                <div class="no-drag flex items-center space-x-2 bg-black/5 dark:bg-white/5 rounded-lg p-1 transition-opacity opacity-0 group-hover:opacity-100">
                    <button id="alwaysOnTopBtn" class="p-1.5 rounded-md hover:bg-black/5 dark:hover:bg-white/10 transition-all active:scale-95" title="Pin on Top">
                        <svg class="w-3.5 h-3.5 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <line x1="12" y1="17" x2="12" y2="22" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></line>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"></path>
                        </svg>
                    </button>
                    <button id="themeBtn" class="p-1.5 rounded-md hover:bg-black/5 dark:hover:bg-white/10 transition-all active:scale-95" title="Toggle Theme">
                         <svg class="w-3.5 h-3.5 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                        </svg>
                    </button>
                    <div class="w-px h-3 bg-gray-300 dark:bg-gray-700"></div>
                    <button id="minimizeBtn" class="p-1.5 rounded-md hover:bg-black/5 dark:hover:bg-white/10 transition-all active:scale-95">
                        <svg class="w-3.5 h-3.5 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"></path>
                        </svg>
                    </button>
                    <button id="closeBtn" class="p-1.5 rounded-md hover:bg-red-500 hover:text-white transition-all active:scale-95 text-red-400">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            </div>
            
            <!-- Main Content Area -->
            <div id="mainContentArea" class="flex-1 flex flex-col overflow-hidden transition-opacity duration-300">
                <!-- Tasks List -->
                <div class="flex-1 no-drag px-4 pb-2 overflow-hidden relative">
                <!-- Top fade for smooth scrolling -->
                <div class="absolute top-0 left-0 right-0 h-4 bg-gradient-to-b from-white/80 to-transparent dark:from-gray-900/80 z-10 pointer-events-none"></div>
                
                <div id="tasksList" class="h-full overflow-y-auto custom-scrollbar space-y-2.5 pt-2 pb-20">
                    <!-- Tasks will be dynamically inserted here -->
                </div>
                
                <!-- Bottom fade -->
                <div class="absolute bottom-0 left-0 right-0 h-12 bg-gradient-to-t from-white/90 to-transparent dark:from-gray-900/90 z-10 pointer-events-none"></div>

                <!-- Empty state -->
                <div id="emptyState" class="hidden absolute inset-0 flex flex-col items-center justify-center p-8 text-center">
                    <div class="w-20 h-20 rounded-full bg-gradient-to-br from-gray-100 to-gray-200 dark:from-gray-800 dark:to-gray-800/50 flex items-center justify-center mb-4 shadow-inner">
                        <svg class="w-8 h-8 text-gray-400 dark:text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                        </svg>
                    </div>
                    <p class="text-sm font-medium text-gray-500 dark:text-gray-400">All caught up!</p>
                    <p class="text-xs text-gray-400 dark:text-gray-500 mt-1">Focus on what matters most.</p>
                </div>
            </div>
            
            <!-- Add Task & Footer (Floating) -->
            <div class="no-drag absolute bottom-0 left-0 right-0 p-4 z-20">
                 <div class="relative group/input">
                    <div class="absolute -inset-0.5 bg-gradient-to-r from-violet-500 to-fuchsia-500 rounded-xl opacity-30 group-focus-within/input:opacity-100 transition-opacity duration-300 blur-[2px]"></div>
                    <div class="relative flex items-center bg-white dark:bg-gray-800 rounded-xl shadow-xl overflow-hidden">
                        <input 
                            id="taskInput" 
                            type="text" 
                            placeholder="Add a new task..." 
                            class="w-full px-4 py-3 bg-transparent text-sm text-gray-800 dark:text-gray-100 placeholder-gray-400 focus:outline-none"
                        >
                        <button id="addBtn" class="p-2 mr-2 rounded-lg bg-gray-100 dark:bg-gray-700 text-gray-500 hover:text-white hover:bg-gradient-to-r hover:from-violet-500 hover:to-fuchsia-500 transition-all duration-300">
                             <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                             </svg>
                        </button>
                    </div>
                 </div>
                 
                 <div class="flex justify-between items-center mt-2 px-2">
                     <span id="taskCount" class="text-[10px] font-medium text-gray-400 dark:text-gray-500 tracking-wide">0 tasks</span>
                     <div class="flex items-center space-x-3">
                         <button id="clearCompletedBtn" class="hidden text-[10px] font-medium text-gray-400 hover:text-red-400 transition-colors uppercase tracking-wide">Clear Done</button>
                         <span class="resize-handle cursor-nw-resize text-gray-300 dark:text-gray-600 hover:text-gray-500">
                             <svg width="8" height="8" viewBox="0 0 8 8" fill="currentColor"><path d="M8 8H0V6H2V4H4V2H6V0H8V8Z"/></svg>
                         </span>
                     </div>
                 </div>
            </div>
                 </div>
            </div>
        </div>
    </div>

        <script type="module" src="app.js"></script>
</body>
</html>
